{% extends "base_layout.html" %}

{% block title %}{{ article.title }}{% endblock %}

{% block content %}
    <div class="article-detail">
        {% if article.thumbnail %}
            <img src="{{ article.thumbnail.url }}" alt="{{ article.title }}" class="article-thumbnail">
        {% endif %}
        <h1>{{ article.title }}</h1>
        <div class="article-body">
            {{ article.body|safe }}
        </div>
    </div>
{% endblock %}
