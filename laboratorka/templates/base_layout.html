{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gruvbox Journal{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" type="image/svg+xml" href="{% static 'imgs/icon.svg' %}">
</head>
<body>
<header class="site-header">
    <div class="header-container">
        <div class="logo">
            <a href="{% url 'homepage' %}" class="logo-link" title="На главную">
                <img src="{% static 'imgs/icon.svg' %}" alt="Gruvbox Journal" class="logo-image">
            </a>
        </div>
        <nav class="main-nav">
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{% url 'homepage' %}"
                       class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
                </li>
                <li class="nav-item">
                    <a href="/articles/" class="nav-link {% if '/articles/' in request.path %}active{% endif %}">Articles</a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'about' %}" class="nav-link {% if '/about/' in request.path %}active{% endif %}">About</a>
                </li>
                {% if user.is_authenticated %}
                <li>
                    <form class="form" action="/accounts/logout/" method="post">
                        {% csrf_token %}
                        <button class="btn btn-outline" type="submit">Logout</button>
                    </form>
                </li>
                {% else %}
                <li>
                    <button class="btn btn-primary" type="submit">
                        <a class="btn btn-primary link" href="{% url 'login' %}">Login</a>
                    </button>
                </li>
                {% endif %}
            </ul>
        </nav>
    </div>
</header>

<main class="main-content">
    {% block content %}
    {% endblock %}
</main>
</body>
</html>
